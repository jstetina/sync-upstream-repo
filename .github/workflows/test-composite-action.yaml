name: Test composite action (no Docker)

on:
  workflow_dispatch:
  push:
    branches:
      - test/composite-action

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run action (upstream == downstream branch, always "Already up to date.")
        uses: ./
        with:
          upstream_repo: "https://github.com/red-hat-data-services/sync-upstream-repo.git"
          upstream_branch: "fix/composite-action-no-docker"
          downstream_repo: "https://github.com/red-hat-data-services/sync-upstream-repo.git"
          downstream_branch: "fix/composite-action-no-docker"
          token: ${{ secrets.GITHUB_TOKEN }}
          merge_args: "--no-edit"
